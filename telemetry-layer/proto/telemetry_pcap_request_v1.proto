syntax = "proto3";

package cybermesh.telemetry.v1;

option go_package = "cybermesh/telemetry-layer/proto/gen/go;telemetrypb";

// PcapRequestV1 represents a scoped PCAP capture request.
message PcapRequestV1 {
  // Schema identifier (e.g., "pcap.request.v1").
  string schema = 1;

  // Unix timestamp in seconds.
  int64 ts = 2;

  // Tenant identifier.
  string tenant_id = 3;

  // Request identity.
  string request_id = 4;
  string requester = 5;
  string reason = 6;

  // Target selector (optional 5-tuple).
  string src_ip = 7;
  string dst_ip = 8;
  uint32 src_port = 9;
  uint32 dst_port = 10;
  uint32 proto = 11;

  // Capture constraints.
  int64 duration_ms = 12;
  int64 max_bytes = 13;
  string sensor_id = 14;
}
