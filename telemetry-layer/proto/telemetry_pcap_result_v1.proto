syntax = "proto3";

package cybermesh.telemetry.v1;

option go_package = "cybermesh/telemetry-layer/proto/gen/go;telemetrypb";

// PcapResultV1 represents the outcome of a PCAP request.
message PcapResultV1 {
  // Schema identifier (e.g., "pcap.result.v1").
  string schema = 1;

  // Unix timestamp in seconds.
  int64 ts = 2;

  // Tenant identifier.
  string tenant_id = 3;

  // Request identity.
  string request_id = 4;
  string sensor_id = 5;

  // Result status.
  string status = 6; // OK | DENIED | FAILED
  string error_message = 7;

  // Storage location and metadata.
  string storage_uri = 8;
  int64 bytes_written = 9;
  int64 duration_ms = 10;
  string content_type = 11;
  string checksum_sha256 = 12;
  int64 retention_until = 13;
}
