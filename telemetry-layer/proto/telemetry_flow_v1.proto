syntax = "proto3";

package cybermesh.telemetry.v1;

option go_package = "cybermesh/telemetry-layer/proto/gen/go;telemetrypb";

// FlowV1 represents a normalized flow record (5-tuple + counters + identity).
message FlowV1 {
  // Schema identifier for compatibility checks (e.g., "flow.v1").
  string schema = 1;

  // Unix timestamp in seconds.
  int64 ts = 2;

  // Tenant identifier (required).
  string tenant_id = 3;

  // Stable flow ID (hash of 5-tuple + window).
  string flow_id = 4;

  // 5-tuple.
  string src_ip = 5;
  string dst_ip = 6;
  uint32 src_port = 7;
  uint32 dst_port = 8;
  uint32 proto = 9;

  // Aggregated counters (optional when unknown).
  int64 bytes_fwd = 10;
  int64 bytes_bwd = 11;
  int64 pkts_fwd = 12;
  int64 pkts_bwd = 13;
  int64 duration_ms = 14;

  // Optional lineage identifiers from the telemetry ingress boundary.
  string trace_id = 57;
  string source_event_id = 58;

  // Identity information (optional).
  Identity identity = 15;

  // Verdict string (FORWARDED/DROPPED/etc).
  string verdict = 16;

  // Hex feature mask represented as raw bytes.
  bytes feature_mask = 17;

  // True when byte/packet counters are known (not inferred).
  bool metrics_known = 18;

  // Source type for routing and validation.
  SourceType source_type = 19;

  // Source identifier (node/agent/gateway/log source).
  string source_id = 20;

  // Timing-derived features (optional).
  bool timing_known = 21;
  double flow_iat_mean = 22;
  double flow_iat_std = 23;
  double flow_iat_max = 24;
  double flow_iat_min = 25;
  double fwd_iat_tot = 26;
  double fwd_iat_mean = 27;
  double fwd_iat_std = 28;
  double fwd_iat_max = 29;
  double fwd_iat_min = 30;
  double bwd_iat_tot = 31;
  double bwd_iat_mean = 32;
  double bwd_iat_std = 33;
  double bwd_iat_max = 34;
  double bwd_iat_min = 35;
  double active_mean = 36;
  double active_std = 37;
  double active_max = 38;
  double active_min = 39;
  double idle_mean = 40;
  double idle_std = 41;
  double idle_max = 42;
  double idle_min = 43;

  // TCP flag counts (optional).
  bool flags_known = 44;
  double fin_flag_cnt = 45;
  double syn_flag_cnt = 46;
  double rst_flag_cnt = 47;
  double psh_flag_cnt = 48;
  double ack_flag_cnt = 49;
  double urg_flag_cnt = 50;
  double cwe_flag_count = 51;
  double ece_flag_cnt = 52;

  // Derivation metadata (optional).
  bool timing_derived = 53;
  string derivation_policy = 54;

  // Lineage timestamps (optional).
  int64 source_event_ts_ms = 55;
  int64 telemetry_ingest_ts_ms = 56;
}

message Identity {
  string namespace = 1;
  string pod = 2;
  string node = 3;
}

enum SourceType {
  SOURCE_TYPE_UNKNOWN = 0;
  SOURCE_TYPE_K8S_CILIUM = 1;
  SOURCE_TYPE_BARE_METAL_EBPF = 2;
  SOURCE_TYPE_GATEWAY_SENSOR = 3;
  SOURCE_TYPE_GCP_VPC = 4;
  SOURCE_TYPE_AWS_VPC = 5;
  SOURCE_TYPE_AZURE_NSG = 6;
  SOURCE_TYPE_PCAP = 7;
  SOURCE_TYPE_ZEEK = 8;
  SOURCE_TYPE_SURICATA = 9;
}
